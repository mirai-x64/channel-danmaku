<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>チャンネル避け</title>
<style>
  html,body{margin:0;height:100%;background:#08090b;overflow:hidden;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{width:min(100vw,150vh);aspect-ratio:3/2;display:block;cursor:none;
    border-radius:14px;box-shadow:0 0 0 10px #16181c,0 0 0 13px #0b0c0e,0 0 60px #000 inset;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
'use strict';
const W = 900, H = 600, CX = W/2, CY = H/2;
const cv = document.getElementById('c');
const g  = cv.getContext('2d');
const dpr = Math.min(devicePixelRatio || 1, 2);
cv.width = W*dpr; cv.height = H*dpr; g.scale(dpr, dpr);

const rnd = (a,b) => a + Math.random()*(b-a);
const TAU = Math.PI*2;

/* ---------- 音(WebAudio、ファイル無し) ---------- */
let ac = null;
const audio = () => (ac ||= new (window.AudioContext||window.webkitAudioContext)());
let noiseBuf = null;
function noise(){
  const a = audio();
  if(!noiseBuf){
    noiseBuf = a.createBuffer(1, a.sampleRate*0.5, a.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  }
  const s = a.createBufferSource(); s.buffer = noiseBuf; s.loop = true; return s;
}
function burst(t0, dur, freq, q, vol){
  const a = audio(), s = noise(), bp = a.createBiquadFilter(), gn = a.createGain();
  bp.type='bandpass'; bp.frequency.value=freq; bp.Q.value=q;
  gn.gain.setValueAtTime(vol, t0);
  gn.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  s.connect(bp).connect(gn).connect(a.destination);
  s.start(t0); s.stop(t0+dur+0.02);
}
function sndKnob(){           // ガチャッ
  const t = audio().currentTime;
  burst(t,        0.045, 2600, 1.2, 0.32);
  burst(t+0.055,  0.075, 1100, 0.9, 0.26);
  const a=audio(), o=a.createOscillator(), gn=a.createGain();
  o.type='square'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(58,t+0.09);
  gn.gain.setValueAtTime(0.16,t); gn.gain.exponentialRampToValueAtTime(0.0001,t+0.11);
  o.connect(gn).connect(a.destination); o.start(t); o.stop(t+0.13);
}
function sndDie(){
  const t = audio().currentTime;
  burst(t, 0.55, 900, 0.4, 0.4);
  const a=audio(), o=a.createOscillator(), gn=a.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(420,t); o.frequency.exponentialRampToValueAtTime(40,t+0.5);
  gn.gain.setValueAtTime(0.2,t); gn.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
  o.connect(gn).connect(a.destination); o.start(t); o.stop(t+0.6);
}

/* ---------- 番組 ----------
   3つとも常時走らせる。映っていない間も進行する。
   どれも自機の位置を参照しない(狙い撃ちしない)。 */

function mkBullet(){ return {x:0,y:0,vx:0,vy:0,r:6,live:false}; }
function pool(n){ const a=[]; for(let i=0;i<n;i++) a.push(mkBullet()); return a; }
function take(p){
  for(let i=0;i<p.length;i++) if(!p[i].live) return p[i];
  const b = mkBullet(); p.push(b); return b;
}
/* 画面外へ出た弾を回収する。
   CULL は「湧かせる位置」より必ず外に取ること。内側にすると、
   壁が生まれたフレームでそのまま消えて、番組が丸ごと空になる。
   気象通報を y=-46 から湧かせていた時に、これが -40 だったせいで
   一発も出ておらず、それを「45秒避けきれた」と読み違えていた。 */
const CULL = 70;
function driftOut(p, dt){
  for(const b of p){
    if(!b.live) continue;
    b.x += b.vx*dt; b.y += b.vy*dt;
    if(b.x<-CULL||b.x>W+CULL||b.y<-CULL||b.y>H+CULL) b.live=false;
  }
}

/* 深夜通販 — 中心から周期的に全方位へ放射。腕は回りながら伸びる。
   同心円状に撃つと外周ほど弾がまばらになり、隅が永久に安全地帯になる。
   腕を回すと、半径 d で隙間に留まるのに必要な横速度が ω*d になり、
   外へ逃げるほど忙しくなる。隅の安全地帯はこれで消える。

   回る点源から等時間間隔で撃つと、隣り合う2発の角度差 ω*iv は撃った瞬間に凍り、
   間隔は半径に比例して開く。腕は外周で必ずほつれる。
   ω=1.10 / iv=0.085 では隅(d=540)で 52px 開いており、腕の 65% はどこでも
   通り抜けられた。「腕を横切れるのは通り抜け口だけ」という前提が成り立っていない。
   隅での間隔 sqrt((sp*iv)^2 + (ω*iv*d)^2) を 2*r + 2*DOT = 18px 未満に収める。
   ω=0.55 / iv=0.050 で 16.6px。回転を落とした分は撃つ間隔で取り戻す。 */
const shopping = {
  name:'深夜通販', tint:'#ff9d4d',
  bullets: pool(700), th: 0, dir: 1, flip: 0, fire: 0, door: 0,
  reset(){ for(const b of this.bullets) b.live=false;
           this.th=0; this.dir=1; this.flip=0; this.fire=0; this.door=0; },
  step(dt, k){
    this.flip += dt;
    if(this.flip >= 2.2){ this.flip = 0; this.dir = -this.dir; }  // 巻き戻ると乗っていた隙間が塞がる
    this.th += this.dir * 0.55 * k * dt;

    this.door += dt;
    const DOOR = 0.80, OPEN = 0.18;      // 腕に周期的な通り抜け口。腕を横切れる唯一の場所
    if(this.door >= DOOR) this.door -= DOOR;

    this.fire += dt;
    const iv = 0.050/k;
    while(this.fire >= iv){
      this.fire -= iv;
      if(this.door < OPEN) continue;
      const n = 4, sp = 150*k;
      for(let i=0;i<n;i++){
        const a = this.th + i*TAU/n, b = take(this.bullets);
        b.live=true; b.r=6;
        b.x = CX + Math.cos(a)*18; b.y = CY + Math.sin(a)*18;
        b.vx = Math.cos(a)*sp;    b.vy = Math.sin(a)*sp;
      }
    }
    driftOut(this.bullets, dt);
  }
};

/* 気象通報 — 画面端を端から端へ掃射する。一掃きが一枚の壁になり、隙間は一箇所。
   点から散らすだけだと画面のほとんどが空くので、湧いた先はまず安全になる。
   端を渡りながら撃つことで、避ける側は「隙間の前に居ればいい」まま、
   何も知らずに湧いた側は壁のどこかに立つことになる。 */
/* 壁は線なので、間隔を詰めても盤面の危険な面積はほとんど増えない(即死 5%→8%)。
   効いたのは弾を遅くして滞在時間を伸ばすことの方。
   SP=140 / REST=0.15 では、先読み 0.5s と 1.0s の測定が 15.8s と 16.0s で一致する。
   測定器の既知の偏りが答えを変えない点なので、この難度は信用してよい。
   SP=210 では同じ2つが 3.3s と 31.0s に割れていた = 読んではいけない領域だった。 */
/* 壁の弾の間隔は「壁かどうか」を決める。自機のドットは半径 DOT=3 なので、
   隣り合う弾の縁が 2*DOT=6px 以上空いていれば、そこは通れる = 壁ではない。
   WEA_N=30 では間隔 W/30=30px、縁の間は 30-12=18px あり、
   気象通報の壁は全域が通り抜け可能だった(壁の弾の 100% がそうだった)。
   即死率 5%、生存 3〜31s のばらつき、AI が壁に歩き込むこと、
   前回まで見ていた症状はすべてこれ一つで説明がつく。壁が壁でなかった。
   間隔 = W/WEA_N を 2*r + 2*DOT = 18px より内側に取る。64 で 14px(縁の間 2px)。 */
/* 掃射は「撃ち終わるまでの間も落ちている」ので、一枚の壁は水平な線ではなく
   高さ SP*SWEEP の斜めの坂になる。壁と壁の縦の間隔は SP*(SWEEP+REST) なので、
   実際に通れる通路の高さは差し引き **SP*REST** しかない。
   SWEEP=1.05 / REST=0.15 では にじみ 147px に対し間隔 168px、通路は 21px だった。
   弾の直径 12px + ドット 6px を引くとほぼ残らない。
   完全知覚で速度を倍にしても 4.1s のまま(人間相当と同じ値)だったのは、
   難しかったからではなく、盤面が閉じていて腕前が効かなかったから。

   なので REST は「休み」ではなく通路の高さそのものとして決める。
   通路 SP*REST = 63px(弾の直径 12 + ドット 6 = 18px の3倍以上)、にじみ SP*SWEEP = 80px。
   ここが即死率 16% と、一点から始めて 30s 閉じないことの両立点。 */
const WEA_SWEEP = 0.57, WEA_REST = 0.45, WEA_N = 64, WEA_GAP = 0.085, WEA_SP = 140, WEA_DRIFT = 0.22;
const weather = {
  name:'気象通報', tint:'#6fd3ff',
  bullets: pool(1200), edge: 0, pos: 0, fire: 0, rest: 0, gap: 0.5, sweeping: true,
  reset(){ for(const b of this.bullets) b.live=false;
           this.edge=0; this.pos=0; this.fire=0; this.rest=0; this.gap=0.5; this.sweeping=true; },
  step(dt, k){
    if(this.sweeping){
      /* 掃射の進み pos は「1発撃つごとに 1/N」進める。
         フレーム単位で進めると、1フレームに2発以上撃つ速さになった途端、
         その2発が同じ u に重なって湧く。壁の実際の間隔は W/N ではなく
         W/(1フレームあたりの発射数で割った数) になり、隙間が開く。
         SWEEP を 1.05→0.57 にした時これが表に出た(間隔 14px のはずが 26px)。 */
      this.fire += dt*k;
      const iv = WEA_SWEEP/WEA_N;
      while(this.fire >= iv && this.pos < 1){
        this.fire -= iv;
        this.pos += 1/WEA_N;
        const u = Math.min(1, this.pos), sp = WEA_SP*k;
        if(Math.abs(u - this.gap) < WEA_GAP) continue;   // 隙間。ここだけ通れる
        let x,y,ax,ay;
        // 画面のすぐ外ではなく十分外から湧かせる。端に寄っていると
        // 壁が自分の上に湧いて、見えた時にはもう当たっている
        if(this.edge===0){ x=u*W; y=-46; ax=0; ay=1; }
        else if(this.edge===1){ x=W+46; y=u*H; ax=-1; ay=0; }
        else if(this.edge===2){ x=u*W; y=H+46; ax=0; ay=-1; }
        else { x=-46; y=u*H; ax=1; ay=0; }
        const b = take(this.bullets);
        b.live=true; b.r=6; b.x=x; b.y=y;
        b.vx=ax*sp; b.vy=ay*sp;
      }
      if(this.pos >= 1){ this.sweeping=false; this.pos=0; this.rest=0; }
    } else {
      this.rest += dt*k;
      if(this.rest >= WEA_REST){
        this.sweeping = true; this.fire = 0;
        /* 向かい合う壁を同時に飛ばさない。
           上下から来た壁は途中で正面衝突し、その瞬間だけは
           「両方の隙間に同時に居る」ことが要求される。隙間の移動 WEA_DRIFT が
           隙間の幅 WEA_GAP を超えていると、そんな点は存在せず盤面が閉じる。
           直交する壁で同じことに気づいて対辺へ変えたが、対辺は正面から来るぶん更に悪く、
           完全知覚でも 3.3s しかもたなかった。

           なので飛んでいる間は同じ辺から撃ち続ける。壁が同じ向きに連なるだけなら、
           追う側は隙間を横に追いかければ抜けられ、通路は途切れない。
           辺を変えるのは画面が空いてからだけ。 */
        if(!this.bullets.some(b => b.live)) this.edge = (this.edge + 1 + ((Math.random()*3)|0)) & 3;
        // 隙間は毎回ずらす。居座れると賭ける動機が消えるので、ここが難度の本体になる
        this.gap = Math.max(0.10, Math.min(0.90, this.gap + rnd(-WEA_DRIFT, WEA_DRIFT)));
      }
    }
    driftOut(this.bullets, dt);
  }
};

/* 砂嵐 — 収縮するリング。リングは一本ではなく、外から次々に重なって降りてくる。
   一本だと危険なのは細い輪の上だけで、盤面のほとんどが空く = 湧いた先はまず安全。
   何本も重なっていれば、どの半径に湧いてもどれかの輪が近い。

   ただし隙間をリングごとに好き勝手な角度へ置くと、通り抜けられない。
   輪が通過するたび別の角度へ回り込まされ、完全知覚でも 7.6s しかもたなかった。
   隙間は全リングで共通の「通路」に揃え、リングごとの散らしは SAND_JIT までにする。
   こうすると通路は放射状に繋がり、追える側は通路に居れば抜けられる。
   一方、何も知らずに湧いた側は、通路の外に立っていればどの道どれかの輪に当たる。 */
const RMAX = 560, RMIN = 14, SAND_NEXT = 300, SAND_JIT = 0.20, SAND_SLIDE = 1.7, SAND_AIM = 1.25;
const sandstorm = {
  name:'砂嵐', tint:'#cfd6e0',
  bullets: pool(1400), rings: [], reseed: 0,
  corr: [0, Math.PI], targ: [0, Math.PI],       // 全リング共通の通路
  // 通路は瞬間移動させない。壁が自分の上に湧いたら避けようがないので、
  // 目標へ滑らせて「閉じてくるのが見える」状態にする
  mkRing(){ return { R: RMAX, jit: [rnd(-SAND_JIT,SAND_JIT), rnd(-SAND_JIT,SAND_JIT)] }; },
  reset(){ this.corr = [rnd(0,TAU), rnd(0,TAU)]; this.targ = this.corr.slice();
           this.rings = [this.mkRing()]; this.reseed = 0;
           for(const b of this.bullets) b.live=false; },
  step(dt, k){
    const newest = this.rings[this.rings.length-1];
    if(!newest || newest.R <= SAND_NEXT) this.rings.push(this.mkRing());

    this.reseed += dt;
    if(this.reseed >= SAND_AIM){ this.reseed = 0; this.targ = [rnd(0,TAU), rnd(0,TAU)]; }

    const rate = SAND_SLIDE*k*dt;
    for(let i=0;i<this.corr.length;i++){        // 通路そのものが滑る
      const d = ((this.targ[i]-this.corr[i]+Math.PI)%TAU+TAU)%TAU - Math.PI;
      this.corr[i] += Math.max(-rate, Math.min(rate, d));
    }
    for(const r of this.rings)
      r.R -= Math.min(Math.max(r.R*0.50, 24), 120)*k*dt;  // 内側ほど遅い = 狭い時間が長い
    this.rings = this.rings.filter(r => r.R > RMIN);

    for(const b of this.bullets) b.live = false;
    for(const r of this.rings){
      const R = r.R;
      // 隙間は弧長が保たれるよう、内側ほど角度を広げる
      const half = Math.min(1.20, Math.max(0.22, 56/R));
      // 弧の間隔も 2*r + 2*DOT = 19px より内側に取る。21px では輪の 93% が通れた
      const step = Math.min(0.23, 15/R);
      for(let a=0; a<TAU; a+=step){
        let blocked = false;
        for(let i=0;i<this.corr.length;i++){
          const gp = this.corr[i] + r.jit[i];   // 共通の通路 + リングごとの散らし
          let d = Math.abs(((a-gp+Math.PI)%TAU+TAU)%TAU - Math.PI);
          if(d < half){ blocked = true; break; }
        }
        if(blocked) continue;
        const b = take(this.bullets);
        b.live=true; b.r=6.5;
        b.x = CX + Math.cos(a)*R; b.y = CY + Math.sin(a)*R;
        b.vx=0; b.vy=0;
      }
    }
  }
};

const CH = [shopping, weather, sandstorm];

/* ---------- 自機 ---------- */
const P = { x:CX, y:H-110, tx:CX, ty:H-110, px:CX, py:H-110 };

let cur = 0, cool = 0, nameT = 0, noiseFrame = 0;
let alive = true, tRun = 0, best = 0, started = false;
const COOL = 1.5;

/* 番組は「ずっと前からやっている」ので、始まりの瞬間も途中である。
   reset して 0 から回すと、毎回まったく同じ盤面から始まることになり、
   実際 AI が 4.85s / 4.85s / 4.75s と同じ死に方を繰り返した。
   進みをランダムに送ってから始める。

   ただし送った先が自機の上だと、開始と同時に死ぬ。
   それは賭けではなく理不尽なので、開始位置が空いている引きだけを採る。 */
function resetGame(){
  P.x = P.tx = P.px = CX; P.y = P.ty = P.py = H-110;
  alive = true; tRun = 0;
  cool = 0; nameT = 0.5; noiseFrame = 0;

  for(let attempt=0; attempt<40; attempt++){
    for(const c of CH) c.reset();
    cur = (Math.random()*CH.length)|0;
    const ahead = 30 + ((Math.random()*220)|0);
    for(let s=0;s<ahead;s++) for(const c of CH) c.step(1/60, 1);
    let clear = true;
    for(const b of CH[cur].bullets)
      if(b.live && Math.hypot(b.x-P.x, b.y-P.y) < 90){ clear = false; break; }
    if(clear) return;
  }
}
resetGame();

function turnKnob(){
  if(!alive || cool > 0) return;
  let n; do { n = (Math.random()*CH.length)|0; } while(n === cur);   // 直前と同じ番組は引かない
  cur = n; cool = COOL; nameT = 0.5; noiseFrame = 1;
  sndKnob();
}

/* ---------- 入力 ---------- */
function toField(cx, cy){
  const r = cv.getBoundingClientRect();
  return [ (cx-r.left)/r.width*W, (cy-r.top)/r.height*H ];
}
addEventListener('mousemove', e => { [P.tx,P.ty] = toField(e.clientX,e.clientY); });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  [P.tx,P.ty] = toField(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
cv.addEventListener('touchstart', e => {
  started = true;
  if(e.touches.length >= 2){ alive ? turnKnob() : resetGame(); return; }
  [P.tx,P.ty] = toField(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
addEventListener('keydown', e => {
  if(e.code === 'Space'){ e.preventDefault(); started = true; turnKnob(); }
  if(e.code === 'KeyR' && !alive) resetGame();
});
addEventListener('mousedown', () => { started = true; if(!alive) resetGame(); });

/* ---------- 当たり ---------- */
const DOT = 3;
function segDist(px,py,ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay, L=dx*dx+dy*dy;
  let t = L>0 ? ((px-ax)*dx+(py-ay)*dy)/L : 0;
  t = t<0?0:t>1?1:t;
  const cx=ax+dx*t, cy=ay+dy*t;
  return Math.hypot(px-cx, py-cy);
}

/* ---------- 検証用の覗き穴 ----------
   tools/play.mjs が実際のブラウザで遊んで確かめるために使う。
   sim.mjs は番組の定義を Node で回すだけなので、入力・当たり・チャンネル切替が
   組み上がった状態で動くかは見ていない。そこを見るための穴。
   できるのは「読む」ことと「キー入力と同じこと」だけで、挙動は変えない。 */
const __dbg = {
  get cur(){ return cur; }, get alive(){ return alive; }, get t(){ return tRun; },
  get cool(){ return cool; }, COOL, CH, P, DOT,
  live: () => CH[cur].bullets.filter(b => b.live).length,
  state(){ return {cur, ch:CH[cur].name, cool:+cool.toFixed(2), alive,
                   t:+tRun.toFixed(2), live:this.live()}; },
  reset(){ resetGame(); started = true; },
  turn(){ turnKnob(); },
  setChannel(n){ cur = n; nameT = 0.5; started = true; },
  aim(x, y){ P.tx = x; P.ty = y; },
  onFrame: null,
};
window.__dbg = __dbg;

/* ---------- ループ ---------- */
let last = performance.now();
function frame(now){
  let dt = (now-last)/1000; last = now;
  if(dt > 0.05) dt = 0.05;
  requestAnimationFrame(frame);

  if(__dbg.onFrame) __dbg.onFrame(dt);   // 検証用。人間が見て動かすのと同じ位置に置く

  const k = alive ? 1 + Math.min(tRun/90, 0.4) : 0;   // ゆるい加速。走行が終わるように

  if(alive){
    tRun += dt;
    cool = Math.max(0, cool - dt);
    nameT = Math.max(0, nameT - dt);
    P.px = P.x; P.py = P.y;
    P.x += (P.tx-P.x)*0.75; P.y += (P.ty-P.y)*0.75;
    P.x = Math.max(4, Math.min(W-4, P.x)); P.y = Math.max(4, Math.min(H-4, P.y));
  }

  // 映っていない番組も進める — これが賭けの正体
  for(const c of CH) c.step(dt, alive ? k : 0.0001);

  if(alive){
    for(const b of CH[cur].bullets){
      if(!b.live) continue;
      if(segDist(b.x,b.y,P.px,P.py,P.x,P.y) < b.r + DOT){
        alive = false; best = Math.max(best, tRun); sndDie(); break;
      }
    }
  }
  draw(k);
}

/* ---------- 描画 ---------- */
function draw(k){
  const ch = CH[cur];
  g.fillStyle = '#0a0b0e'; g.fillRect(0,0,W,H);

  // うっすらとした管の残光
  const rg = g.createRadialGradient(CX,CY,40, CX,CY,520);
  rg.addColorStop(0, 'rgba(40,48,60,0.55)'); rg.addColorStop(1, 'rgba(6,7,9,0)');
  g.fillStyle = rg; g.fillRect(0,0,W,H);

  // 弾
  g.save();
  for(const b of ch.bullets){
    if(!b.live) continue;
    g.beginPath(); g.arc(b.x,b.y,b.r+4,0,TAU);
    g.fillStyle = ch.tint; g.globalAlpha = 0.16; g.fill();
    g.beginPath(); g.arc(b.x,b.y,b.r,0,TAU);
    g.globalAlpha = 1; g.fillStyle = ch.tint; g.fill();
    g.beginPath(); g.arc(b.x-b.r*0.28, b.y-b.r*0.3, b.r*0.42, 0, TAU);
    g.fillStyle = '#fff'; g.globalAlpha = 0.75; g.fill();
    g.globalAlpha = 1;
  }
  g.restore();

  // 自機 + クールダウンのリング
  if(alive){
    g.beginPath(); g.arc(P.x,P.y,13,0,TAU);
    g.fillStyle='rgba(255,255,255,0.10)'; g.fill();
    if(cool > 0){
      g.beginPath(); g.arc(P.x,P.y,17,-Math.PI/2, -Math.PI/2 + TAU*(1-cool/COOL));
      g.strokeStyle='rgba(255,255,255,0.30)'; g.lineWidth=2.5; g.stroke();
    } else {
      g.beginPath(); g.arc(P.x,P.y,17,0,TAU);
      g.strokeStyle='rgba(120,255,190,0.85)'; g.lineWidth=2.5; g.stroke();
    }
    g.beginPath(); g.arc(P.x,P.y,DOT,0,TAU); g.fillStyle='#fff'; g.fill();
  } else {
    g.beginPath(); g.arc(P.x,P.y,26,0,TAU);
    g.strokeStyle='rgba(255,90,90,0.7)'; g.lineWidth=3; g.stroke();
  }

  // 走査線
  g.globalAlpha = 0.16; g.fillStyle = '#000';
  for(let y=0;y<H;y+=3) g.fillRect(0,y,W,1);
  g.globalAlpha = 1;

  // 回した瞬間のノイズ、1フレームだけ
  if(noiseFrame > 0){
    noiseFrame--;
    for(let i=0;i<2600;i++){
      g.fillStyle = Math.random()<0.5 ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.85)';
      g.fillRect(Math.random()*W, Math.random()*H, rnd(3,26), rnd(1,3));
    }
  }

  // 番組名 0.5秒
  if(nameT > 0){
    g.globalAlpha = Math.min(1, nameT/0.18);
    g.font = 'bold 30px sans-serif'; g.textAlign='center';
    g.fillStyle='rgba(0,0,0,0.65)'; g.fillRect(CX-130, H-92, 260, 48);
    g.fillStyle = ch.tint; g.fillText(ch.name, CX, H-58);
    g.globalAlpha = 1;
  }

  // 生存秒数
  g.font = '500 22px ui-monospace,monospace'; g.textAlign='left';
  g.fillStyle = 'rgba(220,230,240,0.75)';
  g.fillText(tRun.toFixed(2) + 's', 20, 34);

  if(!started){
    g.textAlign='center'; g.fillStyle='rgba(230,238,246,0.9)';
    g.font='600 26px sans-serif';
    g.fillText('マウスで動かす', CX, CY-16);
    g.fillText('スペースで回す', CX, CY+22);
  }
  if(!alive){
    g.textAlign='center';
    g.fillStyle='rgba(0,0,0,0.6)'; g.fillRect(0,CY-92,W,184);
    g.fillStyle='#fff'; g.font='bold 62px ui-monospace,monospace';
    g.fillText(tRun.toFixed(2)+'s', CX, CY+6);
    g.font='500 22px sans-serif'; g.fillStyle='rgba(220,230,240,0.8)';
    g.fillText('最長 '+best.toFixed(2)+'s   —   R でもう一度', CX, CY+52);
  }
}
requestAnimationFrame(frame);
</script>
