<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>チャンネル避け</title>
<style>
  html,body{margin:0;height:100%;background:#08090b;overflow:hidden;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{width:min(100vw,150vh);aspect-ratio:3/2;display:block;cursor:none;
    border-radius:14px;box-shadow:0 0 0 10px #16181c,0 0 0 13px #0b0c0e,0 0 60px #000 inset;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
'use strict';
const W = 900, H = 600, CX = W/2, CY = H/2;
const cv = document.getElementById('c');
const g  = cv.getContext('2d');
const dpr = Math.min(devicePixelRatio || 1, 2);
cv.width = W*dpr; cv.height = H*dpr; g.scale(dpr, dpr);

const rnd = (a,b) => a + Math.random()*(b-a);
const TAU = Math.PI*2;

/* ---------- 音(WebAudio、ファイル無し) ---------- */
let ac = null;
const audio = () => (ac ||= new (window.AudioContext||window.webkitAudioContext)());
let noiseBuf = null;
function noise(){
  const a = audio();
  if(!noiseBuf){
    noiseBuf = a.createBuffer(1, a.sampleRate*0.5, a.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  }
  const s = a.createBufferSource(); s.buffer = noiseBuf; s.loop = true; return s;
}
function burst(t0, dur, freq, q, vol){
  const a = audio(), s = noise(), bp = a.createBiquadFilter(), gn = a.createGain();
  bp.type='bandpass'; bp.frequency.value=freq; bp.Q.value=q;
  gn.gain.setValueAtTime(vol, t0);
  gn.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  s.connect(bp).connect(gn).connect(a.destination);
  s.start(t0); s.stop(t0+dur+0.02);
}
function sndKnob(){           // ガチャッ
  const t = audio().currentTime;
  burst(t,        0.045, 2600, 1.2, 0.32);
  burst(t+0.055,  0.075, 1100, 0.9, 0.26);
  const a=audio(), o=a.createOscillator(), gn=a.createGain();
  o.type='square'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(58,t+0.09);
  gn.gain.setValueAtTime(0.16,t); gn.gain.exponentialRampToValueAtTime(0.0001,t+0.11);
  o.connect(gn).connect(a.destination); o.start(t); o.stop(t+0.13);
}
function sndDie(){
  const t = audio().currentTime;
  burst(t, 0.55, 900, 0.4, 0.4);
  const a=audio(), o=a.createOscillator(), gn=a.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(420,t); o.frequency.exponentialRampToValueAtTime(40,t+0.5);
  gn.gain.setValueAtTime(0.2,t); gn.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
  o.connect(gn).connect(a.destination); o.start(t); o.stop(t+0.6);
}

/* ---------- 番組 ----------
   3つとも常時走らせる。映っていない間も進行する。
   どれも自機の位置を参照しない(狙い撃ちしない)。 */

function mkBullet(){ return {x:0,y:0,vx:0,vy:0,r:6,live:false}; }
function pool(n){ const a=[]; for(let i=0;i<n;i++) a.push(mkBullet()); return a; }
function take(p){
  for(let i=0;i<p.length;i++) if(!p[i].live) return p[i];
  const b = mkBullet(); p.push(b); return b;
}
function driftOut(p, dt){
  for(const b of p){
    if(!b.live) continue;
    b.x += b.vx*dt; b.y += b.vy*dt;
    if(b.x<-40||b.x>W+40||b.y<-40||b.y>H+40) b.live=false;
  }
}

/* 深夜通販 — 中心から周期的に全方位へ放射。腕は回りながら伸びる。
   同心円状に撃つと外周ほど弾がまばらになり、隅が永久に安全地帯になる。
   腕を回すと、半径 d で隙間に留まるのに必要な横速度が ω*d になり、
   外へ逃げるほど忙しくなる。隅の安全地帯はこれで消える。 */
const shopping = {
  name:'深夜通販', tint:'#ff9d4d',
  bullets: pool(420), th: 0, dir: 1, flip: 0, fire: 0, door: 0,
  reset(){ for(const b of this.bullets) b.live=false;
           this.th=0; this.dir=1; this.flip=0; this.fire=0; this.door=0; },
  step(dt, k){
    this.flip += dt;
    if(this.flip >= 2.2){ this.flip = 0; this.dir = -this.dir; }  // 巻き戻ると乗っていた隙間が塞がる
    this.th += this.dir * 1.10 * k * dt;

    this.door += dt;
    const DOOR = 0.80, OPEN = 0.18;      // 腕に周期的な通り抜け口。腕を横切れる唯一の場所
    if(this.door >= DOOR) this.door -= DOOR;

    this.fire += dt;
    const iv = 0.085/k;
    while(this.fire >= iv){
      this.fire -= iv;
      if(this.door < OPEN) continue;
      const n = 4, sp = 150*k;
      for(let i=0;i<n;i++){
        const a = this.th + i*TAU/n, b = take(this.bullets);
        b.live=true; b.r=6;
        b.x = CX + Math.cos(a)*18; b.y = CY + Math.sin(a)*18;
        b.vx = Math.cos(a)*sp;    b.vy = Math.sin(a)*sp;
      }
    }
    driftOut(this.bullets, dt);
  }
};

/* 気象通報 — 画面端を移動しながら内側へ掃射 */
const weather = {
  name:'気象通報', tint:'#6fd3ff',
  bullets: pool(320), edge: 0, pos: 0, fire: 0, phase: 0, sway: 0,
  reset(){ for(const b of this.bullets) b.live=false; this.edge=0; this.pos=0; this.fire=0; this.phase=0; },
  step(dt, k){
    const travel = 0.36*k;             // 端を渡りきるのに ~2.8s
    this.pos += travel*dt;
    if(this.pos >= 1){
      this.pos = 0;
      let e; do { e = (Math.random()*4)|0; } while(e === this.edge);
      this.edge = e;
    }
    this.phase += dt;
    const cyc = 0.62, on = 0.36;        // 撃つ / 休む で縦縞の隙間ができる
    this.fire += dt;
    if(this.fire >= 0.055/k){
      this.fire = 0;
      if(this.phase % cyc < on){
        this.sway += 0.31;
        const t = this.pos, sp = 155*k, a0 = Math.sin(this.sway)*0.20;
        let x,y,ax,ay;
        if(this.edge===0){ x=t*W; y=-12; ax=0; ay=1; }
        else if(this.edge===1){ x=W+12; y=t*H; ax=-1; ay=0; }
        else if(this.edge===2){ x=(1-t)*W; y=H+12; ax=0; ay=-1; }
        else { x=-12; y=(1-t)*H; ax=1; ay=0; }
        const ang = Math.atan2(ay,ax) + a0;
        const b = take(this.bullets);
        b.live=true; b.r=6; b.x=x; b.y=y;
        b.vx=Math.cos(ang)*sp; b.vy=Math.sin(ang)*sp;
      }
    }
    driftOut(this.bullets, dt);
  }
};

/* 砂嵐 — ゆっくり収縮するリング。閉じきると再展開 */
const RMAX = 600, RMIN = 14;
const sandstorm = {
  name:'砂嵐', tint:'#cfd6e0',
  bullets: pool(260), R: RMAX, gaps: [], targ: [], reseed: 0,
  // 隙間は瞬間移動させない。壁が自分の上に湧いたら避けようがないので、
  // 目標へ滑らせて「閉じてくるのが見える」状態にする
  aim(){ this.targ = [rnd(0,TAU), rnd(0,TAU)]; },
  newGaps(){ this.gaps = [rnd(0,TAU), rnd(0,TAU)]; this.aim(); },
  reset(){ this.R = RMAX; this.reseed = 0; this.newGaps();
           for(const b of this.bullets) b.live=false; },
  step(dt, k){
    this.R -= Math.min(Math.max(this.R*0.50, 24), 120)*k*dt;  // 内側ほど遅い = 狭い時間が長い
    if(this.R <= RMIN){ this.R = RMAX; this.newGaps(); }
    this.reseed += dt;
    if(this.reseed >= 1.25){ this.reseed = 0; this.aim(); }
    const rate = 1.7*k*dt;
    for(let i=0;i<this.gaps.length;i++){
      const d = ((this.targ[i]-this.gaps[i]+Math.PI)%TAU+TAU)%TAU - Math.PI;
      this.gaps[i] += Math.max(-rate, Math.min(rate, d));
    }
    const R = this.R;
    // 隙間は弧長が保たれるよう、内側ほど角度を広げる
    const half = Math.min(1.20, Math.max(0.22, 56/R));
    const step = Math.min(0.32, 21/R);
    for(const b of this.bullets) b.live = false;
    for(let a=0; a<TAU; a+=step){
      let blocked = false;
      for(const gp of this.gaps){
        let d = Math.abs(((a-gp+Math.PI)%TAU+TAU)%TAU - Math.PI);
        if(d < half){ blocked = true; break; }
      }
      if(blocked) continue;
      const b = take(this.bullets);
      b.live=true; b.r=6.5;
      b.x = CX + Math.cos(a)*R; b.y = CY + Math.sin(a)*R;
      b.vx=0; b.vy=0;
    }
  }
};

const CH = [shopping, weather, sandstorm];

/* ---------- 自機 ---------- */
const P = { x:CX, y:H-110, tx:CX, ty:H-110, px:CX, py:H-110 };

let cur = 0, cool = 0, nameT = 0, noiseFrame = 0;
let alive = true, tRun = 0, best = 0, started = false;
const COOL = 1.5;

function resetGame(){
  for(const c of CH) c.reset();
  cur = 0; cool = 0; nameT = 0.5; noiseFrame = 0;
  P.x = P.tx = P.px = CX; P.y = P.ty = P.py = H-110;
  alive = true; tRun = 0;
}
resetGame();

function turnKnob(){
  if(!alive || cool > 0) return;
  let n; do { n = (Math.random()*CH.length)|0; } while(n === cur);   // 直前と同じ番組は引かない
  cur = n; cool = COOL; nameT = 0.5; noiseFrame = 1;
  sndKnob();
}

/* ---------- 入力 ---------- */
function toField(cx, cy){
  const r = cv.getBoundingClientRect();
  return [ (cx-r.left)/r.width*W, (cy-r.top)/r.height*H ];
}
addEventListener('mousemove', e => { [P.tx,P.ty] = toField(e.clientX,e.clientY); });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  [P.tx,P.ty] = toField(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
cv.addEventListener('touchstart', e => {
  started = true;
  if(e.touches.length >= 2){ alive ? turnKnob() : resetGame(); return; }
  [P.tx,P.ty] = toField(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
addEventListener('keydown', e => {
  if(e.code === 'Space'){ e.preventDefault(); started = true; turnKnob(); }
  if(e.code === 'KeyR' && !alive) resetGame();
});
addEventListener('mousedown', () => { started = true; if(!alive) resetGame(); });

/* ---------- 当たり ---------- */
const DOT = 3;
function segDist(px,py,ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay, L=dx*dx+dy*dy;
  let t = L>0 ? ((px-ax)*dx+(py-ay)*dy)/L : 0;
  t = t<0?0:t>1?1:t;
  const cx=ax+dx*t, cy=ay+dy*t;
  return Math.hypot(px-cx, py-cy);
}

/* ---------- ループ ---------- */
let last = performance.now();
function frame(now){
  let dt = (now-last)/1000; last = now;
  if(dt > 0.05) dt = 0.05;
  requestAnimationFrame(frame);

  const k = alive ? 1 + Math.min(tRun/90, 0.4) : 0;   // ゆるい加速。走行が終わるように

  if(alive){
    tRun += dt;
    cool = Math.max(0, cool - dt);
    nameT = Math.max(0, nameT - dt);
    P.px = P.x; P.py = P.y;
    P.x += (P.tx-P.x)*0.75; P.y += (P.ty-P.y)*0.75;
    P.x = Math.max(4, Math.min(W-4, P.x)); P.y = Math.max(4, Math.min(H-4, P.y));
  }

  // 映っていない番組も進める — これが賭けの正体
  for(const c of CH) c.step(dt, alive ? k : 0.0001);

  if(alive){
    for(const b of CH[cur].bullets){
      if(!b.live) continue;
      if(segDist(b.x,b.y,P.px,P.py,P.x,P.y) < b.r + DOT){
        alive = false; best = Math.max(best, tRun); sndDie(); break;
      }
    }
  }
  draw(k);
}

/* ---------- 描画 ---------- */
function draw(k){
  const ch = CH[cur];
  g.fillStyle = '#0a0b0e'; g.fillRect(0,0,W,H);

  // うっすらとした管の残光
  const rg = g.createRadialGradient(CX,CY,40, CX,CY,520);
  rg.addColorStop(0, 'rgba(40,48,60,0.55)'); rg.addColorStop(1, 'rgba(6,7,9,0)');
  g.fillStyle = rg; g.fillRect(0,0,W,H);

  // 弾
  g.save();
  for(const b of ch.bullets){
    if(!b.live) continue;
    g.beginPath(); g.arc(b.x,b.y,b.r+4,0,TAU);
    g.fillStyle = ch.tint; g.globalAlpha = 0.16; g.fill();
    g.beginPath(); g.arc(b.x,b.y,b.r,0,TAU);
    g.globalAlpha = 1; g.fillStyle = ch.tint; g.fill();
    g.beginPath(); g.arc(b.x-b.r*0.28, b.y-b.r*0.3, b.r*0.42, 0, TAU);
    g.fillStyle = '#fff'; g.globalAlpha = 0.75; g.fill();
    g.globalAlpha = 1;
  }
  g.restore();

  // 自機 + クールダウンのリング
  if(alive){
    g.beginPath(); g.arc(P.x,P.y,13,0,TAU);
    g.fillStyle='rgba(255,255,255,0.10)'; g.fill();
    if(cool > 0){
      g.beginPath(); g.arc(P.x,P.y,17,-Math.PI/2, -Math.PI/2 + TAU*(1-cool/COOL));
      g.strokeStyle='rgba(255,255,255,0.30)'; g.lineWidth=2.5; g.stroke();
    } else {
      g.beginPath(); g.arc(P.x,P.y,17,0,TAU);
      g.strokeStyle='rgba(120,255,190,0.85)'; g.lineWidth=2.5; g.stroke();
    }
    g.beginPath(); g.arc(P.x,P.y,DOT,0,TAU); g.fillStyle='#fff'; g.fill();
  } else {
    g.beginPath(); g.arc(P.x,P.y,26,0,TAU);
    g.strokeStyle='rgba(255,90,90,0.7)'; g.lineWidth=3; g.stroke();
  }

  // 走査線
  g.globalAlpha = 0.16; g.fillStyle = '#000';
  for(let y=0;y<H;y+=3) g.fillRect(0,y,W,1);
  g.globalAlpha = 1;

  // 回した瞬間のノイズ、1フレームだけ
  if(noiseFrame > 0){
    noiseFrame--;
    for(let i=0;i<2600;i++){
      g.fillStyle = Math.random()<0.5 ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.85)';
      g.fillRect(Math.random()*W, Math.random()*H, rnd(3,26), rnd(1,3));
    }
  }

  // 番組名 0.5秒
  if(nameT > 0){
    g.globalAlpha = Math.min(1, nameT/0.18);
    g.font = 'bold 30px sans-serif'; g.textAlign='center';
    g.fillStyle='rgba(0,0,0,0.65)'; g.fillRect(CX-130, H-92, 260, 48);
    g.fillStyle = ch.tint; g.fillText(ch.name, CX, H-58);
    g.globalAlpha = 1;
  }

  // 生存秒数
  g.font = '500 22px ui-monospace,monospace'; g.textAlign='left';
  g.fillStyle = 'rgba(220,230,240,0.75)';
  g.fillText(tRun.toFixed(2) + 's', 20, 34);

  if(!started){
    g.textAlign='center'; g.fillStyle='rgba(230,238,246,0.9)';
    g.font='600 26px sans-serif';
    g.fillText('マウスで動かす', CX, CY-16);
    g.fillText('スペースで回す', CX, CY+22);
  }
  if(!alive){
    g.textAlign='center';
    g.fillStyle='rgba(0,0,0,0.6)'; g.fillRect(0,CY-92,W,184);
    g.fillStyle='#fff'; g.font='bold 62px ui-monospace,monospace';
    g.fillText(tRun.toFixed(2)+'s', CX, CY+6);
    g.font='500 22px sans-serif'; g.fillStyle='rgba(220,230,240,0.8)';
    g.fillText('最長 '+best.toFixed(2)+'s   —   R でもう一度', CX, CY+52);
  }
}
requestAnimationFrame(frame);
</script>
</body>
</html>
